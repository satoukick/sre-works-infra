apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # 必须晚于 cert-manager：opentelemetry-operator.yaml 中包含 cert-manager 的
    # Certificate / Issuer 资源，cert-manager CRD 需要先就绪。
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: "https://github.com/satoukick/sre-works.git"
    path: kubernetes/components/opentelemetry
    targetRevision: main
  destination:
    namespace: default
    server: "https://kubernetes.default.svc"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - CreateNamespace=true
